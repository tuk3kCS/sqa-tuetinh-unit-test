# =============================================================
# TEST PROFILE — H2 in-memory database (replaces MySQL)
# Used by: @SpringBootTest / @DataJpaTest with @ActiveProfiles("test")
# Rollback: @Transactional on test classes auto-rolls back after each test
# =============================================================

# --- H2 In-Memory Database ---
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# --- JWT (deterministic test values) ---
jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RpbmctcHVycG9zZXMtb25seS1taW4tMjU2LWJpdHM=
jwt.access-expiration-ms=900000
jwt.refresh-expiration-ms=1209600000

# --- OTP ---
otp.ttl-minutes=5
otp.cooldown-seconds=60
otp.max-attempts=5

# --- Cloudinary (dummy — mocked in tests) ---
cloudinary.cloud-name=test-cloud
cloudinary.api-key=test-key
cloudinary.api-secret=test-secret

# --- VNPay (dummy — mocked/verified in tests) ---
vnpay.tmn-code=TESTCODE
vnpay.hash-secret=TESTHASHSECRETFORTESTING0123456789ABCDEF
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=http://localhost:8080/api/payments/vnpay/return
vnpay.refund-url=https://sandbox.vnpayment.vn/merchant_webapi/api/transaction

# --- Admin bootstrap (disabled for tests) ---
app.admin.bootstrap.enabled=false
app.admin.bootstrap.email=admin@test.local
app.admin.bootstrap.password=
app.admin.bootstrap.name=Test Admin

# --- Disable scheduling in tests ---
spring.task.scheduling.pool.size=0
