# Integration tests — DB thật (MySQL) qua biến môi trường; mặc định khớp docker-compose profile local-db (cổng 3307).
# Khởi chạy: docker compose --profile local-db up -d
# Hoặc trỏ tới cùng DB như triển khai: export INTEGRATION_JDBC_URL=jdbc:mysql://...
spring.datasource.url=${INTEGRATION_JDBC_URL:jdbc:mysql://127.0.0.1:3307/tuetinh_auth_integration?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${INTEGRATION_DB_USER:root}
spring.datasource.password=${INTEGRATION_DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.sql.init.mode=never

# Tránh gọi SMTP thật khi load context
spring.mail.host=127.0.0.1
spring.mail.port=3025
spring.mail.properties.mail.smtp.auth=false

spring.task.scheduling.enabled=false

# JWT — thời gian sống ngắn cho test (khớp JwtServiceTest)
jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RpbmctcHVycG9zZXMtb25seS1taW4tMjU2LWJpdHM=
jwt.access-expiration-ms=900000
jwt.refresh-expiration-ms=1209600000

app.mail.from=noreply-integration@test.com
